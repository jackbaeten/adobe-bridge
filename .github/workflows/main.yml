name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer\installer.nsi
          if (Test-Path "Adobe Bridge Setup.exe") {
            Move-Item "Adobe Bridge Setup.exe" "dist\Adobe Bridge Setup.exe"
          }
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Adobe-Bridge-Setup
          path: dist/Adobe Bridge Setup.exe
          retention-days: 30
