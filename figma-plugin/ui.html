<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    background: #1E1E26;
    color: #C8C8D4;
    height: 300px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid #2A2A36;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #3A3A4A; flex-shrink: 0; }
  .dot.on { background: #4ADE80; box-shadow: 0 0 6px #4ADE8088; animation: none; }
  .dot.pulsing { animation: pulse 1.4s ease-in-out infinite; background: #F59E0B; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
  .app-name { font-size: 11px; font-weight: 600; color: #7878A0; letter-spacing: .06em; text-transform: uppercase; }
  .sel-box {
    margin: 12px 16px 0;
    border: 1px solid #2A2A36;
    border-radius: 7px;
    padding: 10px 12px;
    background: #17171F;
  }
  .sel-box.on { border-color: #6060A0; }
  .sel-count { font-size: 18px; font-weight: 700; color: #E8E8F4; }
  .sel-count.zero { font-size: 13px; font-weight: 400; color: #505068; }
  .sel-names { margin-top: 4px; color: #6060A0; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .push-btn {
    margin: 14px 16px 0;
    width: calc(100% - 32px);
    padding: 9px;
    border-radius: 7px;
    border: none;
    background: linear-gradient(135deg, #6060C8, #9060C8);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .03em;
    transition: opacity .15s;
  }
  .push-btn:disabled { opacity: .35; cursor: default; }
  .push-btn:not(:disabled):hover { opacity: .85; }
  .log-box {
    flex: 1;
    margin: 10px 16px 14px;
    border: 1px solid #2A2A36;
    border-radius: 6px;
    padding: 6px 8px;
    background: #0F0F17;
    overflow-y: auto;
    font-size: 10px;
    line-height: 1.6;
    color: #50506A;
  }
  .log-box .ok  { color: #4ADE80; }
  .log-box .err { color: #F87171; }
  .log-box .info{ color: #818CF8; }
</style>
</head>
<body>
<div class="header">
  <div class="dot pulsing" id="dot"></div>
  <span class="app-name">Figma to After Effects</span>
</div>
<div class="sel-box" id="selbox">
  <div class="sel-count zero" id="selcnt">Nothing selected</div>
  <div class="sel-names" id="selnames"></div>
</div>
<button class="push-btn" id="pushBtn" disabled>Push to After Effects</button>
<div class="log-box" id="logBox"></div>
<script>
var ws = null, PORT = 61900, HOST_ID = 'FIGMA-' + Date.now(), rtimer = null, selCount = 0;

function log(msg, cls) {
  var box = document.getElementById('logBox');
  var d = document.createElement('div');
  d.className = cls || ''; d.textContent = msg;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
  if (box.children.length > 60) box.removeChild(box.firstChild);
}

function connect() {
  if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
  try { ws = new WebSocket('ws://localhost:' + PORT); } catch(e) { schedule(); return; }
  ws.onopen = function() {
    document.getElementById('dot').className = 'dot on';
    ws.send(JSON.stringify({ type: 'join-overlord', data: { hostName: HOST_ID } }));
    log('Connected to bridge', 'ok');
    clearTimeout(rtimer);
  };
  ws.onmessage = function(e) {
    var msg; try { msg = JSON.parse(e.data); } catch(err) { return; }
    if (msg.type === 'connected') log('Bridge confirmed', 'ok');
    if (msg.type === 'action' && msg.func === 'COMP_BUILT') log('AE comp built: ' + (msg.compName || ''), 'ok');
  };
  ws.onerror = function() {};
  ws.onclose = function() {
    document.getElementById('dot').className = 'dot pulsing';
    log('Disconnected - retrying...', 'info');
    schedule();
  };
}
function schedule() { clearTimeout(rtimer); rtimer = setTimeout(connect, 3000); }

document.getElementById('pushBtn').onclick = function() {
  if (selCount === 0) return;
  parent.postMessage({ pluginMessage: { type: 'get-selection' } }, '*');
  log('Reading selection...', 'info');
};

window.onmessage = function(event) {
  var msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'selection-count') {
    selCount = msg.count;
    var cnt = document.getElementById('selcnt');
    var names = document.getElementById('selnames');
    var box = document.getElementById('selbox');
    var btn = document.getElementById('pushBtn');
    if (msg.count > 0) {
      cnt.className = 'sel-count'; cnt.textContent = msg.count + ' item' + (msg.count !== 1 ? 's' : '');
      names.textContent = (msg.names || []).join(', ');
      box.classList.add('on'); btn.disabled = false;
    } else {
      cnt.className = 'sel-count zero'; cnt.textContent = 'Nothing selected';
      names.textContent = ''; box.classList.remove('on'); btn.disabled = true;
    }
  }
  if (msg.type === 'selection' && msg.data) {
    if (!ws || ws.readyState !== 1) { log('Not connected to bridge', 'err'); return; }
    ws.send(JSON.stringify({
      type: 'action', func: 'LAYERS_PUSH', to: 'ALL',
      fromApp: HOST_ID, artboard: msg.data.artboard, layers: [{ items: msg.data.items }]
    }));
    log('Pushed ' + msg.data.selectedCount + ' layers to AE', 'ok');
  }
};

connect();
setInterval(function() { parent.postMessage({ pluginMessage: { type: 'poll-selection' } }, '*'); }, 1000);
</script>
</body>
</html>
